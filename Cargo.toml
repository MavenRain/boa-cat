[package]
name = "boa-cat"
version = "0.6.0"
edition = "2024"
description = "Tree-walking ECMAScript interpreter built on ecma-syntax-cat.  v0.6.0 adds `await` evaluator dispatch + async function call wrapping (async track chunk 3 of 5-7): `await Resolved(v)` -> `v`, `await Rejected(v)` -> throw `v`, `await Pending` -> TypeError (no continuation in the synchronous tree-walking model), `await non_promise` -> pass through.  Calling an async function (`FunctionDef::is_async()` flag, threaded from `Function::is_async()` / `ArrowFunction::is_async()`) wraps the body's normal completion in a `Resolved` promise and its throw completion in a `Rejected` promise."
license = "MIT OR Apache-2.0"
keywords = ["ecmascript", "javascript", "interpreter", "boa", "type-driven"]
categories = ["development-tools", "compilers"]

[dependencies]
comp-cat-rs = "0.5"
ecma-syntax-cat = "0.1"
ecma-lex-cat = "0.1"
ecma-parse-cat = "0.2"

[dev-dependencies]
proptest = "1"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
needless_pass_by_value = "warn"
manual_map = "warn"
