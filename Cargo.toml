[package]
name = "boa-cat"
version = "0.1.0"
edition = "2024"
description = "Tree-walking ECMAScript interpreter built on ecma-syntax-cat. Evaluates Script programs to Values with a persistent heap and lexical environment. No mut, no Rc/Arc, no interior mutability, no panics, exhaustive matches. Comp-cat-rs reformulation of the Boa engine core, targeting Tauri integration."
license = "MIT OR Apache-2.0"
keywords = ["ecmascript", "javascript", "interpreter", "boa", "type-driven"]
categories = ["development-tools", "compilers"]

[dependencies]
comp-cat-rs = "0.5"
ecma-syntax-cat = "0.1"
ecma-lex-cat = "0.1"
ecma-parse-cat = "0.1"

[dev-dependencies]
proptest = "1"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
needless_pass_by_value = "warn"
manual_map = "warn"
